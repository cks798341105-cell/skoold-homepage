<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>스쿨디 관리자 — SKOOL;D Admin</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.css">
<style>
:root{--r:#C8302B;--g:#0E7C4F;--b:#1E3A8A;--k:#1a1a1a;--gr:#888;--line:#e5e5e5;--bg:#f7f7f5}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Pretendard Variable','Pretendard',-apple-system,sans-serif;background:var(--bg);color:var(--k);-webkit-font-smoothing:antialiased;font-size:14px}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit;font-size:inherit}
input,textarea,select{font-family:inherit;font-size:14px}
a{color:inherit;text-decoration:none}

.screen{display:none}
.screen.active{display:block}

/* LOGIN */
#login{min-height:100vh;display:none;align-items:center;justify-content:center;padding:24px;background:linear-gradient(135deg,#1a1a1a 0%,#2a2a2a 100%)}
#login.active{display:flex}
.login-box{background:#fff;padding:48px 40px;border-radius:16px;width:100%;max-width:420px;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.login-logo{font-family:'Roboto','Helvetica',sans-serif;font-size:32px;font-weight:800;letter-spacing:-1.5px;margin-bottom:6px}
.login-logo .s{color:var(--r);font-style:italic}
.login-sub{font-size:11px;letter-spacing:3px;color:var(--gr);margin-bottom:36px;font-family:monospace}
.login-box h2{font-size:20px;margin-bottom:24px;letter-spacing:-.5px}
.login-field{margin-bottom:16px}
.login-field label{display:block;font-size:11px;font-weight:700;letter-spacing:2px;color:var(--gr);margin-bottom:8px}
.login-field input{width:100%;padding:12px 14px;border:1px solid var(--line);border-radius:6px;transition:.2s}
.login-field input:focus{outline:none;border-color:var(--k)}
.login-btn{width:100%;padding:14px;background:var(--k);color:#fff;font-weight:700;letter-spacing:2px;border-radius:6px;margin-top:8px;transition:.2s}
.login-btn:hover{background:var(--r)}
.login-btn:disabled{opacity:.5;cursor:wait}
.login-error{font-size:12px;color:var(--r);margin-top:12px;text-align:center;min-height:18px}
.login-foot{margin-top:24px;padding-top:20px;border-top:1px solid var(--line);font-size:11px;color:var(--gr);text-align:center;letter-spacing:1px;font-family:monospace}

/* ADMIN LAYOUT */
#admin{display:none;min-height:100vh}
#admin.active{display:flex}
.sidebar{width:240px;background:var(--k);color:#fff;flex-shrink:0;display:flex;flex-direction:column;position:sticky;top:0;height:100vh}
.sb-head{padding:24px 22px;border-bottom:1px solid rgba(255,255,255,.1)}
.sb-logo{font-family:'Roboto','Helvetica',sans-serif;font-size:22px;font-weight:800;letter-spacing:-1px}
.sb-logo .s{color:var(--r);font-style:italic}
.sb-tag{font-size:9px;letter-spacing:3px;color:#888;margin-top:4px;font-family:monospace}
.sb-nav{flex:1;padding:16px 0;overflow-y:auto}
.sb-group{font-size:10px;letter-spacing:2px;color:#555;padding:14px 22px 8px;font-family:monospace}
.sb-item{display:flex;align-items:center;gap:12px;padding:11px 22px;color:#aaa;border-left:3px solid transparent;cursor:pointer;transition:.2s;font-size:13px}
.sb-item:hover{color:#fff;background:rgba(255,255,255,.05)}
.sb-item.active{color:#fff;background:rgba(200,48,43,.15);border-left-color:var(--r)}
.sb-item .badge{margin-left:auto;background:var(--r);color:#fff;font-size:10px;padding:2px 7px;border-radius:99px;font-weight:700}
.sb-foot{padding:14px 22px;border-top:1px solid rgba(255,255,255,.1);display:flex;align-items:center;gap:10px}
.sb-avatar{width:32px;height:32px;border-radius:50%;background:var(--r);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;flex-shrink:0}
.sb-user{flex:1;min-width:0}
.sb-user .name{font-size:13px;font-weight:600;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sb-user .role{font-size:10px;color:#888;letter-spacing:1px;font-family:monospace}
.sb-logout{padding:6px;color:#888;border-radius:4px}
.sb-logout:hover{color:#fff;background:rgba(255,255,255,.1)}

.main{flex:1;min-width:0}
.topbar{background:#fff;border-bottom:1px solid var(--line);padding:18px 32px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:10}
.topbar .l h1{font-size:22px;letter-spacing:-.5px;margin-bottom:2px}
.topbar .l .crumb{font-size:10px;color:var(--gr);letter-spacing:2px;font-family:monospace}
.topbar .r{display:flex;gap:8px;align-items:center}
.btn{padding:8px 16px;border:1px solid var(--line);border-radius:6px;font-size:12px;font-weight:600;background:#fff;transition:.2s;display:inline-flex;align-items:center;gap:6px}
.btn:hover{border-color:var(--k)}
.btn-primary{background:var(--r);color:#fff;border-color:var(--r)}
.btn-primary:hover{background:#a82420;border-color:#a82420}
.btn-k{background:var(--k);color:#fff;border-color:var(--k)}
.btn-sm{padding:5px 10px;font-size:11px}

#content{padding:28px 32px}

/* CARDS */
.grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:24px}
.stat-card{background:#fff;border:1px solid var(--line);border-radius:10px;padding:20px;cursor:pointer;transition:.2s}
.stat-card:hover{border-color:var(--k);transform:translateY(-2px)}
.stat-label{font-size:10px;letter-spacing:2px;color:var(--gr);font-family:monospace;margin-bottom:8px}
.stat-num{font-size:32px;font-weight:300;font-family:'Roboto',sans-serif;letter-spacing:-1px;line-height:1}
.stat-sub{font-size:11px;color:var(--gr);margin-top:4px}

.card{background:#fff;border:1px solid var(--line);border-radius:10px;margin-bottom:16px;overflow:hidden}
.card-head{padding:16px 20px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center}
.card-head h3{font-size:14px;font-weight:700;letter-spacing:-.3px}
.card-head .ct{font-size:11px;color:var(--gr);font-family:monospace}
.card-body{padding:0}

/* TABLE */
table{width:100%;border-collapse:collapse}
thead th{background:#fafafa;font-size:10px;letter-spacing:1.5px;color:var(--gr);font-weight:600;text-align:left;padding:10px 16px;border-bottom:1px solid var(--line)}
tbody td{padding:12px 16px;border-bottom:1px solid #f5f5f5;font-size:13px;vertical-align:middle}
tbody tr:hover{background:#fafafa}
tbody tr:last-child td{border-bottom:0}

.tag{display:inline-block;font-size:10px;font-weight:700;letter-spacing:1px;padding:3px 9px;border-radius:99px;color:#fff}
.tag.r{background:var(--r)} .tag.g{background:var(--g)} .tag.b{background:var(--b)} .tag.k{background:var(--gr)}
.tag.pending{background:#f59e0b}
.tag.new{background:#3b82f6}
.tag.contacted{background:#8b5cf6}
.tag.quoted{background:#06b6d4}
.tag.won{background:var(--g)}
.tag.lost,.tag.closed{background:#888}
.tag.draft{background:#888}
.tag.published{background:var(--g)}
.tag.answered{background:var(--g)}

/* FILTERS */
.filters{padding:12px 16px;display:flex;gap:6px;flex-wrap:wrap;border-bottom:1px solid var(--line);background:#fafafa}
.filter-btn{padding:6px 12px;font-size:11px;font-weight:600;border:1px solid var(--line);border-radius:99px;background:#fff;transition:.2s}
.filter-btn.active{background:var(--k);color:#fff;border-color:var(--k)}
.filter-btn .ct{margin-left:4px;font-family:monospace;opacity:.7}

/* ACTIONS */
.row-actions{display:flex;gap:4px;justify-content:flex-end}
.icon-btn{width:30px;height:30px;border-radius:6px;display:inline-flex;align-items:center;justify-content:center;transition:.15s;color:var(--gr)}
.icon-btn:hover{background:#f0f0f0;color:var(--k)}
.icon-btn.danger:hover{background:#fee2e2;color:var(--r)}

/* EMPTY */
.empty{padding:60px 20px;text-align:center;color:var(--gr)}
.empty .ico{font-size:36px;opacity:.3;margin-bottom:12px}
.empty h4{font-size:14px;color:#666;margin-bottom:6px}
.empty p{font-size:12px}

/* MODAL */
#modal{position:fixed;inset:0;background:rgba(0,0,0,.5);display:none;align-items:flex-start;justify-content:center;z-index:100;padding:40px 20px;overflow-y:auto}
#modal.active{display:flex}
.modal-panel{background:#fff;border-radius:12px;max-width:640px;width:100%;max-height:calc(100vh - 80px);overflow-y:auto;animation:modalIn .2s ease}
@keyframes modalIn{from{opacity:0;transform:translateY(-10px)}to{opacity:1;transform:translateY(0)}}
.modal-head{padding:18px 24px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;background:#fff;z-index:1}
.modal-head h3{font-size:16px;letter-spacing:-.3px}
.modal-close{width:32px;height:32px;border-radius:6px;display:inline-flex;align-items:center;justify-content:center;color:var(--gr);font-size:20px}
.modal-close:hover{background:#f0f0f0;color:var(--k)}
.modal-body{padding:24px}
.modal-foot{padding:16px 24px;border-top:1px solid var(--line);display:flex;justify-content:flex-end;gap:8px;position:sticky;bottom:0;background:#fff}

.field{margin-bottom:16px}
.field label{display:block;font-size:11px;font-weight:700;letter-spacing:1.5px;color:var(--gr);margin-bottom:6px}
.field input,.field textarea,.field select{width:100%;padding:10px 12px;border:1px solid var(--line);border-radius:6px;transition:.15s}
.field input:focus,.field textarea:focus,.field select:focus{outline:none;border-color:var(--k)}
.field textarea{min-height:100px;resize:vertical;font-family:inherit}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.field .req{color:var(--r)}

.upload-area{border:2px dashed var(--line);border-radius:8px;padding:24px;text-align:center;cursor:pointer;transition:.2s;background:#fafafa;position:relative}
.upload-area:hover{border-color:var(--k);background:#f5f5f5}
.upload-area.dragover{border-color:var(--k);background:#fff5f5;border-style:solid;transform:scale(1.01)}
.upload-area.has-image{padding:0;border-style:solid;background:#000}
.upload-area img{width:100%;height:200px;object-fit:cover;border-radius:6px;display:block}
.upload-area .placeholder{color:var(--gr);font-size:13px;pointer-events:none}
.upload-area .ico{font-size:32px;opacity:.3;margin-bottom:8px}
.upload-area .drag-hint{display:block;font-size:11px;margin-top:6px;color:#aaa}
.upload-area .remove-img{position:absolute;top:8px;right:8px;width:32px;height:32px;border-radius:50%;background:rgba(0,0,0,.7);color:#fff;display:none;align-items:center;justify-content:center;font-size:18px;z-index:2;border:none;cursor:pointer}
.upload-area.has-image .remove-img{display:inline-flex}
.upload-area.has-image .remove-img:hover{background:rgba(200,48,43,.95)}

.qa-thread{padding:18px;border-radius:8px;margin-bottom:12px;font-size:13px;line-height:1.7}
.qa-q{background:#fafafa;border-left:3px solid #ccc}
.qa-a{background:#fff8f7;border-left:3px solid var(--r)}
.qa-label{font-weight:700;font-size:12px;margin-right:6px}
.qa-meta{font-size:11px;color:var(--gr);margin-top:8px;font-family:monospace}

/* TOAST */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(100px);background:var(--k);color:#fff;padding:12px 24px;border-radius:99px;font-size:13px;font-weight:500;z-index:200;opacity:0;transition:.3s;box-shadow:0 8px 24px rgba(0,0,0,.2)}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast.error{background:var(--r)}
.toast.success{background:var(--g)}

/* RESPONSIVE */
@media(max-width:900px){
  #admin{flex-direction:column}
  .sidebar{width:100%;height:auto;position:sticky;top:0;flex-direction:row;overflow-x:auto}
  .sb-head{padding:12px 16px;border-right:1px solid rgba(255,255,255,.1);border-bottom:0;flex-shrink:0}
  .sb-logo{font-size:18px}
  .sb-tag{display:none}
  .sb-nav{display:flex;padding:0;flex:1;overflow-x:auto}
  .sb-group{display:none}
  .sb-item{flex-shrink:0;border-left:0;border-bottom:3px solid transparent;padding:14px 16px}
  .sb-item.active{border-left-color:transparent;border-bottom-color:var(--r);background:transparent}
  .sb-foot{display:none}
  .topbar{padding:14px 16px}
  .topbar .l h1{font-size:18px}
  #content{padding:16px}
  .grid-4{grid-template-columns:1fr 1fr;gap:10px}
  .stat-num{font-size:26px}
  table{font-size:12px}
  thead th,tbody td{padding:10px}
  .field-row{grid-template-columns:1fr}
  .modal-panel{max-height:calc(100vh - 40px)}
}
</style>
</head>

<script>
// ============== CONFIG ==============
const SUPABASE_URL = 'https://vygcimhmdiucuyxasksu.supabase.co';
const SUPABASE_KEY = 'sb_publishable_DmxL3WFF9nqjW-pkFKGDoQ_CcwDmbgx';
const TOKEN_KEY = 'sb-skoold-token';
const REFRESH_KEY = 'sb-skoold-refresh';
const USER_KEY = 'sb-skoold-user';

// ============== STATE ==============
let token = localStorage.getItem(TOKEN_KEY);
let refreshToken = localStorage.getItem(REFRESH_KEY);
let user = JSON.parse(localStorage.getItem(USER_KEY) || 'null');
let currentPage = 'dashboard';
let refreshPromise = null; // dedupe concurrent refresh calls

const CAT = {
  glsori: { ko: '글소리', c: '#C8302B' },
  gongan: { ko: '공간소리', c: '#0E7C4F' },
  mudae: { ko: '무대소리', c: '#1E3A8A' },
  etc: { ko: '기타', c: '#888' },
};

// ============== UTILS ==============
function $(s){return document.querySelector(s)}
function $$(s){return document.querySelectorAll(s)}
function toast(msg, type){
  const t = $('#toast');
  t.className = 'toast show ' + (type||'');
  t.textContent = msg;
  setTimeout(()=>t.classList.remove('show'), 2800);
}
function esc(s){return String(s||'').replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}
function fmtDate(s){if(!s)return'';const d=new Date(s);return `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')}`}
function fmtDateTime(s){if(!s)return'';const d=new Date(s);return `${fmtDate(s)} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`}

// ============== API ==============
async function refreshSession(){
  if(!refreshToken) throw new Error('no_refresh_token');
  // Reuse in-flight refresh to prevent stampede
  if(refreshPromise) return refreshPromise;
  refreshPromise = (async () => {
    try {
      const res = await fetch(`${SUPABASE_URL}/auth/v1/token?grant_type=refresh_token`, {
        method: 'POST',
        headers: { 'apikey': SUPABASE_KEY, 'Content-Type': 'application/json' },
        body: JSON.stringify({ refresh_token: refreshToken }),
      });
      if(!res.ok){
        const t = await res.text();
        console.error('[refresh] failed', res.status, t);
        throw new Error('refresh_failed');
      }
      const data = await res.json();
      token = data.access_token;
      refreshToken = data.refresh_token || refreshToken;
      localStorage.setItem(TOKEN_KEY, token);
      localStorage.setItem(REFRESH_KEY, refreshToken);
      console.log('[auth] session refreshed');
      return token;
    } finally {
      refreshPromise = null;
    }
  })();
  return refreshPromise;
}

async function api(method, path, body, _retried){
  const headers = { 'apikey': SUPABASE_KEY };
  if(token) headers['Authorization'] = `Bearer ${token}`;
  if(body){ headers['Content-Type'] = 'application/json'; headers['Prefer'] = 'return=representation' }
  
  const res = await fetch(`${SUPABASE_URL}/rest/v1/${path}`, {
    method, headers,
    body: body ? JSON.stringify(body) : undefined,
  });
  
  if(res.status === 401 && !_retried && refreshToken){
    try { await refreshSession(); return api(method, path, body, true); }
    catch(_){ logout(); throw new Error('세션 만료 — 다시 로그인해주세요'); }
  }
  if(res.status === 401){ logout(); throw new Error('인증 만료. 다시 로그인해주세요.') }
  if(!res.ok){ const t = await res.text(); throw new Error(`${res.status} ${t}`) }
  if(res.status === 204) return null;
  return res.json();
}

async function uploadFile(bucket, path, file, _retried){
  const res = await fetch(`${SUPABASE_URL}/storage/v1/object/${bucket}/${path}`, {
    method: 'POST',
    headers: {
      'apikey': SUPABASE_KEY,
      'Authorization': `Bearer ${token}`,
      'Content-Type': file.type,
      'x-upsert': 'true',
    },
    body: file,
  });
  if(res.status === 401 && !_retried && refreshToken){
    try { await refreshSession(); return uploadFile(bucket, path, file, true); }
    catch(_){ logout(); throw new Error('세션 만료 — 다시 로그인해주세요'); }
  }
  if(!res.ok){
    const text = await res.text();
    let msg = text;
    try { const j = JSON.parse(text); msg = j.message || j.error || text; } catch(_){}
    console.error('[storage upload]', res.status, msg);
    if(res.status === 404)       msg = `버킷 '${bucket}'이 없습니다. Supabase → Storage에서 만드세요.`;
    else if(res.status === 403)  msg = `권한 없음 — Storage 정책 확인 필요 (${msg})`;
    else if(res.status === 413)  msg = '파일 용량 초과';
    throw new Error(`[${res.status}] ${msg}`);
  }
  return `${SUPABASE_URL}/storage/v1/object/public/${bucket}/${path}`;
}

// ============== AUTH ==============
async function login(email, password){
  const res = await fetch(`${SUPABASE_URL}/auth/v1/token?grant_type=password`, {
    method: 'POST',
    headers: { 'apikey': SUPABASE_KEY, 'Content-Type': 'application/json' },
    body: JSON.stringify({ email, password }),
  });
  if(!res.ok){
    const e = await res.json();
    throw new Error(e.error_description || e.msg || '로그인 실패');
  }
  const data = await res.json();
  token = data.access_token;
  refreshToken = data.refresh_token;
  localStorage.setItem(TOKEN_KEY, token);
  localStorage.setItem(REFRESH_KEY, refreshToken);
  
  // Load admin user info
  const me = await api('GET', `admin_users?id=eq.${data.user.id}&select=*`);
  if(!me || me.length === 0){
    logout();
    throw new Error('관리자 권한이 없습니다');
  }
  if(!me[0].is_active){
    logout();
    throw new Error('비활성화된 계정입니다');
  }
  user = me[0];
  localStorage.setItem(USER_KEY, JSON.stringify(user));
  showAdmin();
}

function logout(){
  token = null;
  refreshToken = null;
  user = null;
  localStorage.removeItem(TOKEN_KEY);
  localStorage.removeItem(REFRESH_KEY);
  localStorage.removeItem(USER_KEY);
  showLogin();
}

  // File upload — click + drag-and-drop + remove + validation
  (function setupUploadArea(){
    const area = $('#uploadArea');
    const input = $('#coverFile');
    if(!area || !input) return;

    const MAX_SIZE = 10 * 1024 * 1024;
    const ALLOWED = ['image/jpeg','image/png','image/webp'];

    const placeholderHTML = '<div class="placeholder"><div class="ico">📷</div>클릭하거나 이미지를 끌어다 놓으세요<br><span class="drag-hint">JPG · PNG · WebP · 최대 10MB · 권장 1600×1000px</span></div>';

    async function handleFile(file){
      if(!file) return;
      if(!ALLOWED.includes(file.type)){
        toast('JPG, PNG, WebP 형식만 업로드할 수 있습니다', 'error');
        return;
      }
      if(file.size > MAX_SIZE){
        toast(`파일 용량이 너무 큽니다 (${(file.size/1024/1024).toFixed(1)}MB / 최대 10MB)`, 'error');
        return;
      }

      area.classList.remove('has-image','dragover');
      area.innerHTML = `<div class="placeholder"><div class="ico">⏳</div>업로드 중...<br><span class="drag-hint">${esc(file.name)} (${(file.size/1024).toFixed(0)}KB)</span></div>`;

      try {
        const ext = (file.name.split('.').pop() || 'jpg').toLowerCase();
        const base = file.name.replace(/\.[^.]+$/,'').replace(/[^a-zA-Z0-9가-힣_-]/g,'_').slice(0,40) || 'image';
        const path = `${Date.now()}_${base}.${ext}`;
        const url = await uploadFile('portfolio-images', path, file);
        $('#coverUrl').value = url;
        area.classList.add('has-image');
        area.innerHTML = `<img src="${url}"><button type="button" class="remove-img" id="removeImg" title="이미지 삭제">×</button>`;
        bindRemove();
        toast('업로드 완료', 'success');
      } catch(err){
        console.error('[upload]', err);
        area.classList.remove('has-image');
        area.innerHTML = `<div class="placeholder"><div class="ico">⚠️</div>업로드 실패 — 클릭해서 다시 시도<br><span class="drag-hint" style="color:#c53030">${esc(err.message)}</span></div>`;
        toast('이미지 업로드 실패: '+err.message, 'error');
      } finally {
        input.value = '';
      }
    }

    function bindRemove(){
      const btn = $('#removeImg');
      if(!btn) return;
      btn.onclick = (e)=>{
        e.stopPropagation();
        $('#coverUrl').value = '';
        area.classList.remove('has-image');
        area.innerHTML = placeholderHTML;
        input.value = '';
      };
    }
    bindRemove();

    // Click → file picker (ignore clicks on remove button)
    area.addEventListener('click', (e)=>{
      if(e.target.closest('.remove-img')) return;
      input.click();
    });

    // File picker change
    input.addEventListener('change', (e)=> handleFile(e.target.files[0]));

    // Drag and drop
    ['dragenter','dragover'].forEach(ev=>{
      area.addEventListener(ev, (e)=>{
        e.preventDefault(); e.stopPropagation();
        area.classList.add('dragover');
      });
    });
    ['dragleave','dragend'].forEach(ev=>{
      area.addEventListener(ev, (e)=>{
        e.preventDefault(); e.stopPropagation();
        area.classList.remove('dragover');
      });
    });
    area.addEventListener('drop', (e)=>{
      e.preventDefault(); e.stopPropagation();
      area.classList.remove('dragover');
      const file = e.dataTransfer.files[0];
      handleFile(file);
    });

    // Prevent browser from opening files dropped outside the upload area
    const stopOutside = (e)=>{ if(!e.target.closest('#uploadArea')) e.preventDefault(); };
    window.addEventListener('dragover', stopOutside);
    window.addEventListener('drop', stopOutside);
  })();
}

        ${items.length === 0 ? `<div class="empty"><div class="ico">💬</div><h4>해당하는 문의가 없습니다</h4></div>` : items.map(q=>`
          <div style="padding:18px 20px;border-bottom:1px solid #f5f5f5">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
              <div>
                <span class="tag ${q.brand==='glsori'?'r':q.brand==='gongan'?'g':q.brand==='mudae'?'b':'k'}">${CAT[q.brand]?.ko||q.brand}</span>
                <span style="margin-left:8px;font-weight:600">${esc(q.title)}</span>
              </div>
              <div style="display:flex;align-items:center;gap:8px">
                <span style="font-size:11px;color:#888;font-family:monospace">${esc(q.author_name)} · ${fmtDate(q.created_at)}</span>
                ${q.status==='pending' ? `<button class="btn btn-primary btn-sm" onclick="answerQna('${q.id}')">답변 작성</button>` : `<span class="tag answered">답변완료</span>`}
              </div>
            </div>
            <div class="qa-thread qa-q"><span class="qa-label">Q.</span>${esc(q.content)}</div>
            ${q.answer ? `<div class="qa-thread qa-a"><span class="qa-label" style="color:#C8302B">A.</span>${esc(q.answer)}<div class="qa-meta">답변자: ${esc(q.answered_by||'미상')} · ${fmtDateTime(q.answered_at)}</div></div>` : ''}
          </div>
        `).join('')}
      </div>
    `;
  } catch(e){ showError(e) }
}

async function answerQna(id){
  const r = await api('GET', `qna_posts?id=eq.${id}&select=*`);
  const item = r[0];
  openModal(`
    <div class="modal-head">
      <h3>Q&A 답변 작성</h3>
      <button class="modal-close" onclick="closeModal()">×</button>
    </div>
    <div class="modal-body">
      <div class="qa-thread qa-q" style="margin-bottom:20px">
        <div style="font-weight:600;margin-bottom:8px">${esc(item.title)}</div>
        <div><span class="qa-label">Q.</span>${esc(item.content)}</div>
        <div class="qa-meta">${esc(item.author_name)} · ${fmtDate(item.created_at)}</div>
      </div>
      <div class="field">
        <label>답변 내용 <span class="req">*</span></label>
        <textarea id="qa_answer" style="min-height:160px" placeholder="고객 문의에 대한 답변을 작성해주세요. 구체적 일정·견적 범위·연락 방법을 포함하면 좋습니다."></textarea>
      </div>
      <div style="font-size:11px;color:#888">답변자: <b>${esc(user.name)} ${esc(user.role)}</b></div>
    </div>
    <div class="modal-foot">
      <button class="btn" onclick="closeModal()">취소</button>
      <button class="btn btn-primary" onclick="saveQnaAnswer('${id}')">답변 등록</button>
    </div>
  `);
}

async function saveQnaAnswer(id){
  const answer = $('#qa_answer').value.trim();
  if(!answer) return toast('답변을 입력해주세요', 'error');
  try {
    await api('PATCH', `qna_posts?id=eq.${id}`, {
      answer,
      answered_by: user.id,
      answered_at: new Date().toISOString(),
      status: 'answered',
    });
    closeModal();
    toast('답변이 등록되었습니다', 'success');
    loadBadges();
    renderQna();
  } catch(e){ toast('등록 실패: '+e.message, 'error') }
}

// ============== INQUIRIES ==============
let inqFilter = 'all';

async function renderInquiries(){
  try {
    let q = 'inquiries?select=*&order=created_at.desc';
    if(inqFilter !== 'all') q += `&status=eq.${inqFilter}`;
    const items = await api('GET', q);
    
    $('#content').innerHTML = `
      <div class="card">
        <div class="card-head">
          <h3>견적·상담 문의</h3>
          <span class="ct">${items.length}건</span>
        </div>
        <div class="filters">
          ${['all','new','contacted','quoted','won','lost'].map(f=>`
            <button class="filter-btn ${inqFilter===f?'active':''}" onclick="inqFilter='${f}';renderInquiries()">${({all:'전체',new:'신규',contacted:'연락중',quoted:'견적발송',won:'수주',lost:'실주'}[f])}</button>
          `).join('')}
        </div>
        ${items.length === 0 ? `<div class="empty"><div class="ico">📬</div><h4>해당하는 문의가 없습니다</h4><p>홈페이지 Contact 폼이 제출되면 여기 표시됩니다.</p></div>` : `
          <table>
            <thead><tr>
              <th style="width:90px">접수일</th>
              <th>학교 / 담당자</th>
              <th>제목</th>
              <th style="width:120px">연락처</th>
              <th style="width:90px">상태</th>
              <th style="width:60px"></th>
            </tr></thead>
            <tbody>
              ${items.map(i=>`
                <tr style="cursor:pointer" onclick="viewInquiry('${i.id}')">
                  <td style="font-family:monospace;font-size:11px;color:#888">${fmtDate(i.created_at)}</td>
                  <td><b>${esc(i.school_name)}</b><div style="font-size:11px;color:#888">${esc(i.contact_person)}</div></td>
                  <td style="font-size:12px">${esc(i.subject || '(제목 없음)')}</td>
                  <td style="font-family:monospace;font-size:11px">${esc(i.phone)}</td>
                  <td><span class="tag ${i.status}">${({new:'신규',contacted:'연락중',quoted:'견적발송',won:'수주',lost:'실주',closed:'종료'}[i.status])}</span></td>
                  <td>→</td>
                </tr>
              `).join('')}
            </tbody>
          </table>
        `}
      </div>
    `;
  } catch(e){ showError(e) }

      <h3>문의 상세</h3>
      <button class="modal-close" onclick="closeModal()">×</button>
    </div>
    <div class="modal-body">
      <div style="background:#fafafa;border-radius:8px;padding:18px;margin-bottom:20px">
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;font-size:13px">
          <div><div style="font-size:10px;color:#888;letter-spacing:1px;margin-bottom:2px">학교명</div><b>${esc(i.school_name)}</b></div>
          <div><div style="font-size:10px;color:#888;letter-spacing:1px;margin-bottom:2px">담당자</div><b>${esc(i.contact_person)}</b></div>
          <div><div style="font-size:10px;color:#888;letter-spacing:1px;margin-bottom:2px">전화</div><a href="tel:${i.phone}">${esc(i.phone)}</a></div>
          <div><div style="font-size:10px;color:#888;letter-spacing:1px;margin-bottom:2px">이메일</div><a href="mailto:${i.email}">${esc(i.email)}</a></div>
        </div>
      </div>
      <div class="field"><label>제목</label><div style="padding:10px 12px;background:#fafafa;border-radius:6px">${esc(i.subject || '(없음)')}</div></div>
      <div class="field"><label>문의 내용</label><div style="padding:14px;background:#fafafa;border-radius:6px;white-space:pre-wrap;line-height:1.7">${esc(i.content)}</div></div>
      ${i.reference_url ? `<div class="field"><label>참고 URL</label><a href="${esc(i.reference_url)}" target="_blank" style="color:#1E3A8A">${esc(i.reference_url)}</a></div>` : ''}
      <hr style="border:none;border-top:1px solid #eee;margin:20px 0">
      <div class="field"><label>처리 상태</label>
        <select id="inq_status">
          <option value="new" ${i.status==='new'?'selected':''}>신규</option>
          <option value="contacted" ${i.status==='contacted'?'selected':''}>연락중</option>
          <option value="quoted" ${i.status==='quoted'?'selected':''}>견적발송</option>
          <option value="won" ${i.status==='won'?'selected':''}>수주</option>
          <option value="lost" ${i.status==='lost'?'selected':''}>실주</option>
          <option value="closed" ${i.status==='closed'?'selected':''}>종료</option>
        </select>
      </div>
      <div class="field"><label>내부 메모</label><textarea id="inq_notes" placeholder="처리 내용·견적·통화 내용 등 (고객에게 보이지 않음)">${esc(i.notes||'')}</textarea></div>
      <div style="font-size:11px;color:#888;font-family:monospace">접수: ${fmtDateTime(i.created_at)}</div>
    </div>
    <div class="modal-foot">
      <button class="btn" onclick="closeModal()">닫기</button>
      <button class="btn btn-primary" onclick="saveInquiry('${id}')">저장</button>
    </div>
  `);
}

async function saveInquiry(id){
  try {
    await api('PATCH', `inquiries?id=eq.${id}`, {
      status: $('#inq_status').value,
      notes: $('#inq_notes').value.trim() || null,
      updated_at: new Date().toISOString(),
      assigned_to: user.id,
    });
    closeModal();
    toast('업데이트되었습니다', 'success');
    loadBadges();
    renderInquiries();
  } catch(e){ toast('실패: '+e.message, 'error') }
}

            <div style="flex:1;min-width:0">
              <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px">
                <span style="background:#eee;padding:2px 8px;border-radius:99px;font-size:10px;font-weight:700">${esc(h.title)}</span>
                <span style="font-size:11px;color:#888;font-family:monospace">→ /${esc(h.link_page)}</span>
              </div>
              <div style="font-weight:600;font-size:14px">${esc(h.main_copy)}</div>
              <div style="font-size:12px;color:#888;margin-top:2px">${esc(h.sub_copy||'')}</div>
            </div>
            <button class="btn ${h.is_active?'':'btn-k'} btn-sm" onclick="toggleHero(${h.id}, ${!h.is_active})" style="${h.is_active?'background:#dcfce7;color:#166534;border-color:#bbf7d0':''}">
              ${h.is_active?'● 활성':'○ 비활성'}
            </button>

      </div>

async function toggleHero(id, newState){
  try {
    await api('PATCH', `hero_slides?id=eq.${id}`, { is_active: newState, updated_at: new Date().toISOString() });
    toast(newState?'활성화됨':'비활성화됨', 'success');
    renderHero();
  } catch(e){ toast('실패: '+e.message, 'error') }
}

      mobile: $('#s_mobile').value,

// ============== MODAL & HELPERS ==============
function openModal(html){
  const m = $('#modal');
  m.innerHTML = `<div class="modal-panel">${html}</div>`;
  m.classList.add('active');
  m.onclick = (e)=>{ if(e.target===m) closeModal() };
}
function closeModal(){
  $('#modal').classList.remove('active');
  $('#modal').innerHTML = '';
}
function showError(e){
  $('#content').innerHTML = `<div class="empty"><div class="ico">⚠️</div><h4>데이터를 불러올 수 없습니다</h4><p>${esc(e.message)}</p></div>`;
}

// ============== EVENT BINDINGS ==============
$('#loginForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const btn = $('#loginBtn');
  const err = $('#loginError');
  btn.disabled = true; btn.textContent = '로그인 중...';
  err.textContent = '';
  try {
    await login($('#loginEmail').value, $('#loginPassword').value);
  } catch(e){
    err.textContent = e.message;
    btn.disabled = false; btn.textContent = '로그인';
  }
});

$('#logoutBtn').addEventListener('click', ()=>{
  if(confirm('로그아웃 하시겠습니까?')) logout();
});

$$('.sb-item').forEach(el => {
  el.addEventListener('click', (e) => {
    e.preventDefault();
    navigate(el.dataset.page);
  });
});

// ============== INIT ==============
if(token && user){
  showAdmin();
} else {
  showLogin();
}
</script>
